services:
  nginx:
    image: nginx:1.31.1-alpine3.23
    container_name: app_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /var/cache/nginx:size=1024m,uid=101,gid=101
    deploy:
      resources:
        limits:
          memory: "512M"
          cpus: "0.50"
        reservations:
          memory: "256M"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "256m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - php
    networks:
      - app_network

  php:
    working_dir: /var/www
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: app_php
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/var/www/
      - composer_cache:/root/.composer/cache
    command: >
      sh -c "composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader &&
             exec php-fpm"
    environment:
      TZ: ${TZ}
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      OPCACHE_VALIDATE_TIMESTAMPS: ${OPCACHE_VALIDATE_TIMESTAMPS:-1}
      COMPOSER_PROCESS_TIMEOUT: 1800
      COMPOSER_MEMORY_LIMIT: -1
      COMPOSER_ALLOW_SUPERUSER: 1
      COMPOSER_HOME: /root/.composer
      COMPOSER_CACHE_DIR: /root/.composer/cache
      COMPOSER_NO_INTERACTION: 1
      DB_CONNECTION: ${DB_CONNECTION}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DATABASE: ${REDIS_DATABASE:-1}
      REDIS_PREFIX: ${REDIS_PREFIX:-SESS:}
      REDIS_TIMEOUT: ${REDIS_TIMEOUT:-2.5}
      REDIS_READ_TIMEOUT: ${REDIS_READ_TIMEOUT:-2.5}
      REDIS_PERSISTENT: ${REDIS_PERSISTENT:-1}
      PHP_FPM_PM: dynamic
      PHP_FPM_PM_MAX_CHILDREN: 10
      PHP_FPM_PM_START_SERVERS: 2
      PHP_FPM_PM_MIN_SPARE_SERVERS: 1
      PHP_FPM_PM_MAX_SPARE_SERVERS: 3
      PHP_FPM_PM_MAX_REQUESTS: 500
    tmpfs:
      - /tmp:size=1g,mode=1777
    deploy:
      resources:
        limits:
          memory: "1024M"
          cpus: "2.00"
        reservations:
          memory: "512M"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9000 || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  redis:
    image: redis:8.6-alpine3.23
    container_name: app_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      TZ: ${TZ}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: >
      sh -c "exec redis-server --requirepass \"$${REDIS_PASSWORD}\""
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -h 127.0.0.1 -p 6379 -a \"$${REDIS_PASSWORD}\" ping | grep PONG || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - ./docker/redis:/data
    networks:
      - app_network

  postgres:
    image: postgres:18.4-alpine3.23
    container_name: app_postgres
    restart: unless-stopped
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=384MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c wal_buffers=16MB
        -c max_connections=50
        -c checkpoint_completion_target=0.9
        -c synchronous_commit=off
        -c log_min_duration_statement=1000
        -c log_timezone=${TZ}
        -c temp_file_limit=256MB
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./docker/postgres/storage:/var/lib/postgresql/data/pgdata
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    tmpfs:
      - /tmp:size=64m,mode=1777
    deploy:
      resources:
        limits:
          memory: "512M"
          cpus: "1.00"
        reservations:
          memory: "256M"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "${DB_PORT}:${DB_PORT}"
    networks:
      - app_network

volumes:
  composer_cache:
    driver: local

networks:
  app_network:
    driver: bridge