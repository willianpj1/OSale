<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{ vite('resources/css/app.css') }}
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap">
    
    <title>Cadastro | OSale</title>
    
    <style>
        :root {
            --bg: #0e0e0e;
            --surface: #161616;
            --surface2: #1c1c1c;
            --border: #242424;
            --white: #f0f0f0;
            --muted: #666666;
            --accent: #ffffff;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            margin: 0;
            padding: 2rem 1.5rem;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -120px;
            left: -120px;
            width: 400px;
            height: 400px;
            border: 1px solid var(--border);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .register-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            animation: fadeUp 0.6s ease both;
        }

        .register-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-brand-name {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-style: italic;
            font-size: 2.2rem;
            color: var(--white);
            letter-spacing: -0.02em;
            line-height: 1;
            margin: 0 0 0.25rem;
        }

        .register-brand-sub {
            font-size: 0.68rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .register-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2.5rem 2rem;
            position: relative;
        }

        .register-card::before, .register-card::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--white);
        }
        .register-card::before { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
        .register-card::after { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }

        .register-heading {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--white);
            margin: 0 0 0.25rem;
        }

        .register-sub {
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.06em;
            margin: 0 0 2rem;
        }

        .field-label {
            display: block;
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        .field-group {
            display: flex;
            align-items: center;
            background-color: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 2px;
            transition: border-color 0.2s ease;
            overflow: hidden;
        }

        .field-group:focus-within { border-color: var(--white); }

        .field-icon {
            padding: 0 0.85rem;
            color: var(--muted);
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .field-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            padding: 0.75rem 0.75rem 0.75rem 0;
        }

        .field-input::placeholder { color: var(--muted); }

        .field-toggle {
            background: transparent;
            border: none;
            color: var(--muted);
            padding: 0 0.85rem;
            cursor: pointer;
            transition: color 0.2s ease;
            font-size: 0.9rem;
        }

        .field-toggle:hover { color: var(--white); }

        .field-mb { margin-bottom: 1.25rem; }

        .row-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        @media (max-width: 480px) {
            .row-fields { grid-template-columns: 1fr; }
        }

        .btn-cadastrar {
            width: 100%;
            background: var(--white);
            color: var(--bg);
            border: none;
            border-radius: 2px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            padding: 0.85rem 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: background 0.2s ease;
            margin-top: 1.75rem;
            margin-bottom: 1.5rem;
        }

        .btn-cadastrar:hover { background: #e0e0e0; }

        .register-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .register-divider-line { flex: 1; height: 1px; background: var(--border); }

        .register-footer-text { text-align: center; font-size: 0.75rem; color: var(--muted); }
        .register-footer-text a { color: var(--white); text-decoration: none; font-weight: 500; }

        .secure-badge {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.68rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .secure-badge i { margin-right: 0.4rem; opacity: 0.5; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <div class="register-wrapper">

        <div class="register-brand">
            <p class="register-brand-name text-black">OSale</p>
            <p class="register-brand-sub">Gestão de OS & Vendas</p>
        </div>

        <div class="register-card">
            <h1 class="register-heading">Criar conta</h1>
            <p class="register-sub">Preencha os dados para se cadastrar</p>

            <form id="form">

                <div class="row-fields">
                    <div>
                        <label class="field-label" for="nome">Nome</label>
                        <div class="field-group">
                            <span class="field-icon"><i class="bi bi-person"></i></span>
                            <input class="field-input" type="text" id="nome" name="nome"
                                placeholder="Seu nome" required>
                        </div>
                    </div>
                    <div>
                        <label class="field-label" for="sobrenome">Sobrenome</label>
                        <div class="field-group">
                            <span class="field-icon"><i class="bi bi-person"></i></span>
                            <input class="field-input" type="text" id="sobrenome" name="sobrenome"
                                placeholder="Seu sobrenome" required>
                        </div>
                    </div>
                </div>

                <div class="field-mb">
                    <label class="field-label" for="email">E-mail</label>
                    <div class="field-group">
                        <span class="field-icon"><i class="bi bi-envelope"></i></span>
                        <input class="field-input" type="email" id="email" name="email"
                            placeholder="seu@email.com" autocomplete="email" required>
                    </div>
                </div>

                <div class="field-mb">
                    <label class="field-label" for="cpf">CPF</label>
                    <div class="field-group">
                        <span class="field-icon"><i class="bi bi-credit-card"></i></span>
                        <input class="field-input" type="text" id="cpf" name="cpf"
                            placeholder="000.000.000-00" autocomplete="off" required>
                    </div>
                </div>

                <div class="field-mb">
                    <label class="field-label" for="rg">RG</label>
                    <div class="field-group">
                        <span class="field-icon"><i class="bi bi-card-text"></i></span>
                        <input class="field-input" type="text" id="rg" name="rg"
                            placeholder="0000000" autocomplete="off" required>
                    </div>
                </div>

                <div class="field-mb">
                    <label class="field-label" for="senha">Senha</label>
                    <div class="field-group">
                        <span class="field-icon"><i class="bi bi-lock"></i></span>
                        <input class="field-input" type="password" id="senha" name="senha"
                            placeholder="Mínimo 8 caracteres" autocomplete="new-password" required>
                        <button class="field-toggle" type="button" id="toggleSenha" tabindex="-1">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="field-label" for="confirmarSenha">Confirmar senha</label>
                    <div class="field-group">
                        <span class="field-icon"><i class="bi bi-lock"></i></span>
                        <input class="field-input" type="password" id="confirmarSenha" name="confirmarSenha"
                            placeholder="Repita a senha" autocomplete="new-password" required>
                        <button class="field-toggle" type="button" id="toggleConfirmarSenha" tabindex="-1">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="btnCadastrar" class="btn-cadastrar">
                    <i class="bi bi-person-plus"></i> Cadastrar
                </button>

            </form>

            <div class="register-divider">
                <span class="register-divider-line"></span>
            </div>

            <p class="register-footer-text">
                Já tem conta? <a href="/login">Entrar</a>
            </p>
        </div>

        <p class="secure-badge">
            <i class="bi bi-shield-check"></i>Conexão segura e criptografada
        </p>

    </div>

    {{ vite('resources/js/app.js') }}
    {{ vite('resources/js/pages/register.js') }}

</body>
</html>
