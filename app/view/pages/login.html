<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{ vite('resources/css/app.css') }}
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap">
    
    <title>Login | OSale</title>
    
    <style>
        :root {
            --bg: #0e0e0e;
            --surface: #161616;
            --surface2: #1c1c1c;
            --border: #242424;
            --white: #f0f0f0;
            --muted: #666666;
            --accent: #ffffff;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Grain Effect */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        /* Decorative circle */
        body::after {
            content: '';
            position: fixed;
            bottom: -120px;
            left: -120px;
            width: 400px;
            height: 400px;
            border: 1px solid var(--border);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
            animation: fadeUp 0.6s ease both;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-brand-name {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-style: italic;
            font-size: 2.2rem;
            color: var(--white);
            letter-spacing: -0.02em;
            line-height: 1;
            margin: 0 0 0.25rem;
        }

        .login-brand-sub {
            font-size: 0.68rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .login-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2.5rem 2rem;
            position: relative;
        }

        /* Corner accents */
        .login-card::before, .login-card::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--white);
        }
        .login-card::before { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
        .login-card::after { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }

        .login-heading {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--white);
            margin: 0 0 0.25rem;
        }

        .login-sub {
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.06em;
            margin: 0 0 2rem;
        }

        .field-label {
            display: block;
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        .field-group {
            display: flex;
            align-items: center;
            background-color: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 2px;
            transition: border-color 0.2s ease;
            overflow: hidden;
        }

        .field-group:focus-within { border-color: var(--white); }

        .field-icon {
            padding: 0 0.85rem;
            color: var(--muted);
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .field-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            padding: 0.75rem 0.75rem 0.75rem 0;
        }

        .field-toggle {
            background: transparent;
            border: none;
            color: var(--muted);
            padding: 0 0.85rem;
            cursor: pointer;
            transition: color 0.2s ease;
            font-size: 0.9rem;
        }

        .field-toggle:hover { color: var(--white); }
        .field-mb { margin-bottom: 1.25rem; }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.72rem;
            color: var(--muted);
            text-decoration: none;
            margin: 0.5rem 0 1.75rem;
            transition: color 0.2s ease;
        }
        .forgot-link:hover { color: var(--white); }

        .btn-row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            align-items: stretch;
            flex-wrap: wrap;
        }

        .btn-entrar {
            flex: 1;
            min-width: 140px;
            background: var(--white);
            color: var(--bg);
            border: none;
            border-radius: 2px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            padding: 0.75rem 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        .btn-entrar:hover { background: #e0e0e0; }

        .google-wrap {
            flex: 1;
            min-width: 170px;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .login-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .login-divider-line { flex: 1; height: 1px; background: var(--border); }
        .login-divider-text { font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }

        .login-footer-text { text-align: center; font-size: 0.75rem; color: var(--muted); }
        .login-footer-text a { color: var(--white); text-decoration: none; font-weight: 500; }

        .secure-badge {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.68rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .secure-badge i { margin-right: 0.4rem; opacity: 0.5; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <div class="login-wrapper">

        <div class="login-brand">
            <p class="login-brand-name text-black">OSale</p>
            <p class="login-brand-sub">Gestão de OS & Vendas</p>
        </div>

        <div class="login-card">
            <h1 class="login-heading">Bem-vindo de volta</h1>
            <p class="login-sub">Acesse o painel de controle</p>

            <form id="form">
                <div class="field-mb">
                    <label class="field-label" for="login">Login</label>
                    <div class="field-group">
                        <span class="field-icon"><i class="bi bi-person"></i></span>
                        <input class="field-input" type="text" id="login" name="login"
                            placeholder="CPF, telefone ou e-mail" autocomplete="username" required>
                    </div>
                </div>

                <div>
                    <label class="field-label" for="senha">Senha</label>
                    <div class="field-group">
                        <span class="field-icon"><i class="bi bi-lock"></i></span>
                        <input class="field-input" type="password" id="senha" name="senha"
                            placeholder="Informe sua senha" autocomplete="current-password" required>
                        <button class="field-toggle" type="button" id="toggleSenha" tabindex="-1">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <a href="#" class="forgot-link">Esqueceu a senha?</a>

                <div class="btn-row">
                    <button type="submit" class="btn-entrar">
                        <i class="bi bi-box-arrow-in-right"></i> Entrar
                    </button>
                    
                    <div class="google-wrap">
                        <div id="g_id_onload"
                            data-client_id="591155148069-vcqbmp0577r9dsecqpouoefin0ecgfjo.apps.googleusercontent.com"
                            data-context="signin"
                            data-ux_mode="popup"
                            data-login_uri="http://localhost/auth/google"
                            data-auto_prompt="false">
                        </div>
                        <div class="g_id_signin"
                            data-type="standard"
                            data-shape="rectangular"
                            data-theme="filled_black"
                            data-text="signin_with"
                            data-size="large"
                            data-logo_alignment="left"
                            data-width="190"> </div>
                    </div>
                </div>
            </form>

            <div class="login-divider">
                <span class="login-divider-line"></span>
                <span class="login-divider-text">ou</span>
                <span class="login-divider-line"></span>
            </div>

            <p class="login-footer-text">
                Não tem conta? <a href="/cadastro">Cadastre-se</a>
            </p>
        </div>

        <p class="secure-badge">
            <i class="bi bi-shield-check"></i>Conexão segura e criptografada
        </p>
    </div>

    {{ vite('resources/js/app.js') }}
    {{ vite('resources/js/pages/login.js') }}
    <script src="https://accounts.google.com/gsi/client" async></script>

</body>
</html>
