{% extends "main.html" %}

{% block main %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<div class="container py-4">
    <div class="row align-items-center mb-4">
        <div class="col-sm-6">
            <h3 class="fw-bold mb-0">
                <i class="bi bi-person-gear me-2 text-primary"></i>{{titulo}}
            </h3>
        </div>
        <div class="col-sm-6">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb float-sm-end small">
                    <li class="breadcrumb-item"><a href="/home">Início</a></li>
                    <li class="breadcrumb-item"><a href="/usuario/lista">Usuários</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Cadastro</li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="row">
        <div class="col-12 col-lg-10 mx-auto">
            <form id="form" class="needs-validation">
                <input type="hidden" id="acao" name="acao" value="{{acao}}">
                <input type="hidden" id="id" name="id" value="{{id}}">
                
                <div class="card shadow-sm mb-4">
                    <div class="card-header py-3 bg-dark">
                        <div class="d-flex justify-content-between align-items-center">
                            <h6 class="card-title mb-0 text-muted fw-bold text-uppercase small">Dados Pessoais</h6>
                            <a href="/usuario/lista" class="btn btn-outline-secondary btn-sm px-3">
                                <i class="bi bi-arrow-left me-1"></i> Voltar
                            </a>
                        </div>
                    </div>
                    
                    <div class="card-body p-4">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="nome" class="form-label fw-bold small text-muted text-uppercase">Nome</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-dark">
                                        <i class="bi bi-person text-primary"></i>
                                    </span>
                                    <input type="text" class="form-control" id="nome" name="nome" 
                                           placeholder="Ex: Calango" value="{{user.nome}}" required>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="sobrenome" class="form-label fw-bold small text-muted text-uppercase">Sobrenome</label>
                                <input type="text" class="form-control" id="sobrenome" name="sobrenome" 
                                       placeholder="Ex: Cuia" value="{{user.sobrenome}}" required>
                            </div>

                            <div class="col-md-4">
                                <label for="rg" class="form-label fw-bold small text-muted text-uppercase">RG</label>
                                <input type="text" class="form-control" id="rg" name="rg" 
                                       placeholder="00.000.000-0" value="{{user.rg}}">
                            </div>

                            <div class="col-md-4">
                                <label for="cpf" class="form-label fw-bold small text-muted text-uppercase">CPF</label>
                                <input type="text" class="form-control" id="cpf" name="cpf" 
                                       placeholder="000.000.000-00" value="{{user.cpf}}">
                            </div>

                            <div class="col-md-4">
                                <label for="senha" class="form-label fw-bold small text-muted text-uppercase">Senha</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-dark">
                                        <i class="bi bi-lock text-primary"></i>
                                    </span>
                                    <input type="password" class="form-control" id="senha" name="senha" 
                                           placeholder="Senha segura" value="{{user.senha}}" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer bg-dark p-4 d-flex justify-content-end">
                        <button type="button" id="salvar" class="btn btn-primary px-5 fw-bold shadow-sm">
                            <i class="bi bi-check2-circle me-2"></i> Salvar Registro
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
{% include 'script.html' %}
<script defer type="module" src="/js/user.js"></script>
{% endblock %}
