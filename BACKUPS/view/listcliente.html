{% extends "main.html" %}
{% block main %}

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<div class="container py-4">
    <div class="row align-items-center mb-4">
        <div class="col-sm-6">
            <h3 class="fw-bold mb-0">
                <i class="bi bi-people-fill me-2 text-primary"></i>Gestão de Clientes
            </h3>
        </div>
        <div class="col-sm-6">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb float-sm-end small">
                    <li class="breadcrumb-item"><a href="/home">Início</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Clientes</li>
                </ol>
            </nav>
        </div>
    </div>

    <form id="form">
        <input type="hidden" id="id" name="id">

        <div class="card shadow-sm">
            <div class="card-header py-3 bg-dark">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="m-0 fw-bold text-muted text-uppercase small">Relação de Clientes</h6>

                    <div class="d-flex gap-2">
                        <a href="/cliente/print" target="_blank" class="btn btn-sm btn-outline-secondary px-3 shadow-sm">
                            <i class="bi bi-printer me-1"></i> Imprimir
                        </a>

                        <a href="/cliente/cadastro" class="btn btn-sm btn-primary px-3 shadow-sm fw-bold">
                            <i class="bi bi-person-plus-fill me-1"></i> Cadastrar
                        </a>
                    </div>
                </div>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="tabela">
                        <thead class="table-dark small">
                            <tr>
                                <th class="ps-4 py-3" style="width: 100px;">CÓDIGO</th>
                                <th>NOME / FANTASIA</th>
                                <th>SOBRENOME / RAZÃO</th>
                                <th>CPF / CNPJ</th>
                                <th>RG / IE</th>
                                <th>STATUS</th>
                                <th class="text-center" style="width: 150px;">AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody class="small">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="modal fade" id="modal-editar" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow-lg">
                    <div class="modal-header bg-primary text-dark py-3">
                        <h5 class="modal-title fw-bold">
                            <i class="bi bi-pencil-square me-2"></i>Editar Cliente
                        </h5>
                        <button type="button" class="btn-close btn-close-dark" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body p-4">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="nome_fantasia_modal" name="nome_fantasia" placeholder="Nome">
                            <label for="nome_fantasia_modal">Nome / Fantasia</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="sobrenome_razao_modal" name="sobrenome_razao" placeholder="Sobrenome">
                            <label for="sobrenome_razao_modal">Sobrenome / Razão Social</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="cpf_cnpj_modal" name="cpf_cnpj" placeholder="CPF/CNPJ">
                            <label for="cpf_cnpj_modal">CPF / CNPJ</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="rg_ie_modal" name="rg_ie" placeholder="RG/IE">
                            <label for="rg_ie_modal">RG / IE</label>
                        </div>
                    </div>
                    <div class="modal-footer p-3">
                        <button type="button" class="btn btn-dark border fw-semibold px-4" data-bs-dismiss="modal">Fechar</button>
                        <button type="button" id="salvarEditar" class="btn btn-primary px-4 fw-bold shadow-sm">
                            Atualizar Dados
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

{% endblock %}

{% block script %}
{% include "script.html" %}
<script defer type="module" src="/js/listacliente.js"></script>
{% endblock %}
