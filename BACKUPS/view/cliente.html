{% extends "main.html" %}

{% block main %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<div class="container py-4">
    <div class="row align-items-center mb-4">
        <div class="col-sm-6">
            <h3 class="fw-bold mb-0">
                <i class="bi bi-person-badge me-2 text-primary"></i>{{titulo}}
            </h3>
        </div>
        <div class="col-sm-6">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb float-sm-end small">
                    <li class="breadcrumb-item"><a href="/home">Início</a></li>
                    <li class="breadcrumb-item"><a href="/cliente/lista">Clientes</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Cadastro</li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="row">
        <div class="col-12 col-xl-10 mx-auto">
            <form id="form">
                <input type="hidden" id="acao" name="acao" value="{{acao}}">
                <input type="hidden" id="id" name="id" value="{{id}}">

                <div class="card shadow-sm mb-4">
                    <div class="card-header py-3 bg-dark">
                        <div class="d-flex justify-content-between align-items-center">
                            <h6 class="m-0 fw-bold text-muted text-uppercase small">Dados do Cliente</h6>
                            <a href="/cliente/lista" class="btn btn-sm btn-outline-secondary px-3">
                                <i class="bi bi-arrow-left me-1"></i> Voltar
                            </a>
                        </div>
                    </div>

                    <div class="card-body p-4">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="nome_fantasia"
                                    class="form-label small fw-bold text-muted text-uppercase">Nome / Nome
                                    Fantasia</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-dark">
                                        <i class="bi bi-person text-primary"></i>
                                    </span>
                                    <input type="text" class="form-control" id="nome_fantasia" name="nome_fantasia"
                                        placeholder="Ex: João Silva ou Loja do Bairro" value="{{client.nome_fantasia}}"
                                        autofocus required>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="sobrenome_razao"
                                    class="form-label small fw-bold text-muted text-uppercase">Sobrenome / Razão
                                    Social</label>
                                <input type="text" class="form-control" id="sobrenome_razao" name="sobrenome_razao"
                                    placeholder="Sobrenome completo ou Razão Social" value="{{client.sobrenome_razao}}"
                                    required>
                            </div>

                            <div class="col-md-4">
                                <label for="rg_ie" class="form-label small fw-bold text-muted text-uppercase">RG /
                                    Inscrição Estadual</label>
                                <input type="text" class="form-control" id="rg_ie" name="rg_ie"
                                    placeholder="Documento de identidade" value="{{client.rg_ie}}">
                            </div>

                            <div class="col-md-4">
                                <label for="cpf_cnpj" class="form-label small fw-bold text-muted text-uppercase">CPF /
                                    CNPJ</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-dark">
                                        <i class="bi bi-card-text text-primary"></i>
                                    </span>
                                    <input type="text" class="form-control" id="cpf_cnpj" name="cpf_cnpj"
                                        placeholder="000.000.000-00" value="{{client.cpf_cnpj}}" required>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <label for="ativo" class="form-label small fw-bold text-muted text-uppercase">Status do
                                    Cliente</label>
                                <select class="form-select" id="ativo" name="ativo">
                                    <option value="1" {% if client.ativo==1 %}selected{% endif %}>Ativo</option>
                                    <option value="0" {% if client.ativo==0 %}selected{% endif %}>Inativo</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer bg-dark p-4 d-flex justify-content-end">
                        <button type="button" id="salvar" class="btn btn-primary px-5 fw-bold shadow-sm">
                            <i class="bi bi-save me-2"></i> Salvar Registro
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
{% include 'script.html' %}
<script defer type="module" src="/js/cliente.js"></script>
{% endblock %}
