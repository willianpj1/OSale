{% extends "main.html" %}
{% block main %}

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<div class="container py-4">
    <div class="row align-items-center mb-4">
        <div class="col-sm-6">
            <h3 class="fw-bold mb-0">
                <i class="bi bi-building me-2 text-primary"></i>Gestão de Empresas
            </h3>
        </div>
        <div class="col-sm-6">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb float-sm-end small">
                    <li class="breadcrumb-item"><a href="/home">Início</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Empresas</li>
                </ol>
            </nav>
        </div>
    </div>

    <form id="form">
        <input type="hidden" id="id" name="id">

        <div class="card shadow-sm">
            <div class="card-header py-3 bg-dark">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="m-0 fw-bold text-muted text-uppercase small">Relação de Empresas</h6>

                    <div class="d-flex gap-2">
                        <a href="/empresa/print" target="_blank" class="btn btn-sm btn-outline-secondary px-3 shadow-sm">
                            <i class="bi bi-printer me-1"></i> Imprimir
                        </a>

                        <a href="/empresa/cadastro" class="btn btn-sm btn-primary px-3 shadow-sm fw-bold">
                            <i class="bi bi-plus-circle-fill me-1"></i> Cadastrar
                        </a>
                    </div>
                </div>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="tabela">
                        <thead class="table-dark small">
                            <tr>
                                <th class="ps-4 py-3" style="width: 100px;">CÓDIGO</th>
                                <th>NOME FANTASIA</th>
                                <th>RAZÃO SOCIAL</th>
                                <th>CNPJ</th>
                                <th>RG</th>
                                <th>STATUS</th>
                                <th class="text-center" style="width: 150px;">AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody class="small">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </form>
</div>

{% endblock %}

{% block script %}
{% include "script.html" %}
<script defer type="module" src="/js/listaempresa.js"></script>
{% endblock %}
