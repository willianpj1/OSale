{% extends "main.html" %}

{% block main %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<div class="app-content-header py-4">
    <div class="container-fluid">
        <div class="row align-items-center">
            <div class="col-sm-6">
                <h3 class="fw-bold mb-0">
                    Bem-vindo ao Lunar <i class="fa-solid fa-meteor fa-lg"></i>
                </h3>
                <p class="text-muted small mb-0">Painel de controle e gestão rápida</p>
            </div>
            <div class="col-sm-6">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb float-sm-end small">
                        <li class="breadcrumb-item active" aria-current="page">Início</li>
                    </ol>
                </nav>
            </div>
        </div>
    </div>
</div>

        <div class="row g-3">

                        <div>

                            <a href="/usuario/lista" class="btn btn-sm btn-btn-sm btn-outline-primary px-3 mt-2">Acessar</a>
